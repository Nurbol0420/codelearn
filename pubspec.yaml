name: codelearn
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  flutter_svg: ^2.0.17
  smooth_page_indicator: ^1.2.0+3
  get_storage: ^2.1.1
  google_fonts: ^6.2.1
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.65.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.1
  http: ^1.3.0
  video_player: ^2.9.2
  chewie: ^1.10.0
  intl: ^0.20.2
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.2
  firebase_auth: ^5.4.1
  cloudinary_public: ^0.23.1
  image_picker: ^1.2.0
  permission_handler: ^11.3.1
  uuid: ^4.4.2
  file_picker: ^10.0.0
  fluttertoast: ^8.2.4
  image_gallery_saver_plus: ^4.0.1
  open_file: ^3.3.2
  device_info_plus: ^9.1.2
  google_sign_in: ^6.2.1
  docx_to_text: 1.0.1
  syncfusion_flutter_pdf: ^33.2.5

dev_dependencies:
  flutter_launcher_icons: "^0.14.4"
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  # Мұндағы assets бөлімі бос болса, қате бермеуі үшін түсіндірме (comment) ретінде қалдырдым немесе астына қосыңыз

# БҰЛ БӨЛІМ ЕҢ ШЕТТЕ (СОЛ ЖАҚТА) ТҰРУЫ КЕРЕК:
flutter_launcher_icons:
  android: "codelearn_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/images/icon.png"
  macos:
    generate: true
    image_path: "assets/images/icon.png"